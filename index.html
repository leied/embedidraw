<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Embedidraw</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- process.env polyfill: excalidraw's CJS entry reads these before the
         module system can substitute them, so we define them as globals. -->
    <script>window.process = { env: { IS_PREACT: 'false', NODE_ENV: 'production' } }</script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
